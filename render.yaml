# Blueprint Render — New → Blueprint, ou config manuelle (voir checklist ci-dessous).
# Postgres gratuit Render n’existe plus : plan basic-256mb, ou Neon + coller DATABASE_URL.
# Disque archives : plan payant uniquement (sinon les fichiers sont éphémères).

databases:
  - name: mega-postgres
    plan: basic-256mb
    databaseName: mega_finance
    user: mega

services:
  - type: web
    name: mega-admin
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mega-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ADMIN_IDENTIFIANT
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CEO_PASSWORD
        sync: false
