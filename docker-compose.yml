# Base PostgreSQL pour MEGA SN SARL (optionnel — production / équipe)
# Démarrer : docker compose up -d
# Puis dans .env : DATABASE_URL="postgresql://mega:mega_secret@localhost:5432/mega_finance"
# Et changer provider dans prisma/schema.prisma en "postgresql", puis : npm run db:setup

services:
  postgres:
    image: postgres:16-alpine
    container_name: mega-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mega
      POSTGRES_PASSWORD: mega_secret
      POSTGRES_DB: mega_finance
    ports:
      - "5432:5432"
    volumes:
      - mega_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mega -d mega_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mega_pg_data:
